<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syincro - Sign In</title>
  <meta name="description" content="Sign in to your Syincro unified inbox account.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- Particles Background -->
  <div class="particles-container"></div>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card glass-card">
        <!-- Header -->
        <div class="auth-header">
          <a href="index.html" class="auth-logo">
            <div class="auth-logo-icon">S</div>
            Syincro
          </a>
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Sign in to access your unified inbox</p>
        </div>

        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <div class="tab-indicator" data-tab="login"></div>
          <div class="auth-tab active" data-tab="login">Sign In</div>
          <div class="auth-tab" data-tab="signup">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form class="auth-form form-section active" id="login-form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input 
              type="email" 
              id="login-email" 
              class="form-input" 
              placeholder="you@example.com"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input 
              type="password" 
              id="login-password" 
              class="form-input" 
              placeholder="••••••••"
              required
            >
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox">
              Remember me
            </label>
            <a href="#" class="forgot-link" onclick="showForgotModal(); return false;">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-full">
            Sign In
          </button>
        </form>

        <!-- Signup Form -->
        <form class="auth-form form-section" id="signup-form">
          <div class="form-group">
            <label class="form-label" for="signup-name">Full Name</label>
            <input 
              type="text" 
              id="signup-name" 
              class="form-input" 
              placeholder="John Doe"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-email">Email</label>
            <input 
              type="email" 
              id="signup-email" 
              class="form-input" 
              placeholder="you@example.com"
              required
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password">Password</label>
            <input 
              type="password" 
              id="signup-password" 
              class="form-input" 
              placeholder="••••••••"
              minlength="8"
              required
            >
          </div>
          <button type="submit" class="btn btn-primary btn-full">
            Create Account
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">or continue with</div>

        <!-- Google Sign-In -->
        <button class="google-btn" onclick="handleGoogleSignIn()">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Privacy Note -->
        <div class="privacy-note">
          <strong>🔒 We never store your message content</strong><br>
          Your privacy is our priority. All messages are end-to-end encrypted.
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/shared.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
